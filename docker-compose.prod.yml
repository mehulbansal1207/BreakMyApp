services:
  postgres:
    image: postgres:15-alpine
    container_name: breakmyapp-postgres
    environment:
      POSTGRES_DB: breakmyapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d breakmyapp" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    container_name: breakmyapp-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped
  # -----------------------------------------------------------------------
  # Docker socket proxy — Phase 3b
  # Tecnativa/docker-socket-proxy exposes a filtered subset of the Docker
  # API over TCP.  Only CONTAINERS, POST, and EXEC are enabled — the
  # minimum surface for: docker run, docker cp, docker exec, docker rm.
  # The worker connects via DOCKER_HOST=tcp://docker-socket-proxy:2375
  # instead of mounting /var/run/docker.sock directly.
  # -----------------------------------------------------------------------
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: breakmyapp-docker-proxy
    restart: unless-stopped
    environment:
      - CONTAINERS=1
      - POST=1
      - EXEC=1
      - LOGS=1
      - IMAGES=0
      - NETWORKS=0
      - VOLUMES=0
      - SWARM=0
      - SYSTEM=0
      - PLUGINS=0
      - SERVICES=0
      - TASKS=0
      - NODES=0
      - SECRETS=0
      - CONFIGS=0
      - BUILD=0
      - COMMIT=0
      - DISTRIBUTION=0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:2375/version"]
      interval: 5s
      timeout: 5s
      retries: 5
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: breakmyapp-backend
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: breakmyapp-worker
    command: celery -A app.celery_app worker --loglevel=info --concurrency=1
    env_file:
      - .env
    environment:
      # Route all Docker CLI calls through the socket proxy (Phase 3b).
      # No direct /var/run/docker.sock mount on the worker — all Docker
      # API access is filtered through the proxy's allowlist.
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: breakmyapp-beat
    command: celery -A app.celery_app beat --loglevel=info
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: breakmyapp-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped
volumes:
  postgres_data:
  redis_data:
networks:
  app-network:
    driver: bridge
